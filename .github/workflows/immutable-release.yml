name: Financial OS immutable candidate

on:
  push:
  pull_request:

concurrency:
  group: fos-immutable-${{ github.ref }}
  cancel-in-progress: false

env:
  TARGET_PLATFORM: linux/amd64
  REGISTRY: ghcr.io

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: financial_os_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testuser"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: worker/requirements.txt
      - name: Backend build, vet, and tests
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_USER: testuser
          DB_PASSWORD: testpass
          DB_NAME: financial_os_test
          DB_SSL_MODE: disable
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
        run: |
          set -Eeuo pipefail
          go build ./...
          go vet ./...
          go test ./... -count=1 -p=1 -v 2>&1 | tee /tmp/fos-go-tests.log
          if grep -E '(^|--- )SKIP|no tests to run' /tmp/fos-go-tests.log; then
            echo 'database-backed test skipped; immutable candidate rejected' >&2
            exit 1
          fi
      - name: Frontend install, lint, build, and unit tests
        working-directory: frontend
        env:
          VITE_BUILD_SHA: ${{ github.sha }}
          VITE_APP_VERSION: 0.0.0-candidate
        run: |
          set -Eeuo pipefail
          npm ci
          npm run lint
          npm run build
          npm test
      - name: Worker type check
        working-directory: worker
        run: |
          set -Eeuo pipefail
          pip install -r requirements.txt pyright
          pyright .
      - name: Immutable release contracts
        run: |
          set -Eeuo pipefail
          chmod +x ops/release/*.sh ops/release/*.py
          ops/release/test-reproducible-build-contract.sh
          ops/release/test-ghcr-publication-workflow.sh
          ops/release/test-immutable-release-contract.sh
          python3 -m json.tool docs/operations/financial-os-release-manifest.schema.json >/dev/null

  publish-candidate:
    if: github.event_name == 'push'
    needs: quality-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      artifact-name: ${{ steps.identity.outputs.artifact_name }}
      release-id: ${{ steps.identity.outputs.release_id }}
      release-oci-ref: ${{ steps.publish-release.outputs.release_oci_ref }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: oras-project/setup-oras@22ce207df3b08e061f537244349aac6ae1d214f6
      - name: Define immutable candidate identity
        id: identity
        shell: bash
        run: |
          set -Eeuo pipefail
          release_id="candidate-${GITHUB_SHA}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          artifact_name="fos-release-evidence-${GITHUB_SHA}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          echo "release_id=$release_id" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$artifact_name" >> "$GITHUB_OUTPUT"
      - name: Build twice, verify reproducibility, and publish application images
        id: images
        shell: bash
        env:
          RELEASE_ID: ${{ steps.identity.outputs.release_id }}
        run: |
          set -Eeuo pipefail
          export SOURCE_DATE_EPOCH="$(git show -s --format=%ct "$GITHUB_SHA")"
          source_url="https://github.com/${GITHUB_REPOSITORY}"
          build_and_publish() {
            local role="$1" dockerfile="$2"
            local repository="ghcr.io/sanhaji182/financial-os-${role}"
            local common=(
              --platform linux/amd64 --no-cache
              --provenance=false --sbom=false
              --build-arg "BUILD_SHA=${GITHUB_SHA}"
              --build-arg "APP_VERSION=${RELEASE_ID}"
              --build-arg "OCI_SOURCE=${source_url}"
              --build-arg "SOURCE_DATE_EPOCH=${SOURCE_DATE_EPOCH}"
              --file "$dockerfile" .
            )
            local archive_a="${RUNNER_TEMP}/fos-${role}-repro-a.tar"
            local archive_b="${RUNNER_TEMP}/fos-${role}-repro-b.tar"
            docker buildx build --tag "fos-${role}:repro-a" \
              --output "type=docker,dest=${archive_a},rewrite-timestamp=true" "${common[@]}"
            docker buildx build --tag "fos-${role}:repro-b" \
              --output "type=docker,dest=${archive_b},rewrite-timestamp=true" "${common[@]}"
            image_fingerprint() {
              python3 - "$1" <<'PY'
          import hashlib,json,sys,tarfile
          with tarfile.open(sys.argv[1]) as archive:
              manifest=json.load(archive.extractfile('manifest.json'))[0]
              members=[manifest['Config'], *manifest['Layers']]
              digest=hashlib.sha256()
              for name in members:
                  body=archive.extractfile(name).read()
                  digest.update(len(body).to_bytes(8,'big'))
                  digest.update(body)
              print('sha256:' + digest.hexdigest())
          PY
            }
            config_digest() {
              tar -xOf "$1" manifest.json | python3 -c \
                'import json,sys; print("sha256:" + json.load(sys.stdin)[0]["Config"].split("/")[-1].removesuffix(".json"))'
            }
            local first second config
            first="$(image_fingerprint "$archive_a")"
            second="$(image_fingerprint "$archive_b")"
            [[ "$first" =~ ^sha256:[0-9a-f]{64}$ ]]
            [[ "$second" =~ ^sha256:[0-9a-f]{64}$ ]]
            test "$first" = "$second" || {
              echo "non-reproducible ${role} image archive: ${first} != ${second}" >&2
              return 1
            }
            config="$(config_digest "$archive_b")"
            [[ "$config" =~ ^sha256:[0-9a-f]{64}$ ]]
            docker load --input "$archive_b"
            loaded="$(docker image inspect "fos-${role}:repro-b" --format '{{.Id}}')"
            test "$loaded" = "$config"
            echo "${role}_reproducible_fingerprint=${second}" >> "$GITHUB_OUTPUT"
            echo "${role}_image_id=${loaded}" >> "$GITHUB_OUTPUT"
            docker tag "fos-${role}:repro-b" "${repository}:${RELEASE_ID}"
            docker push "${repository}:${RELEASE_ID}"
            local digest
            digest="$(docker buildx imagetools inspect "${repository}:${RELEASE_ID}" --format '{{json .Manifest.Digest}}' | tr -d '"')"
            [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]
            echo "${role}_ref=${repository}@${digest}" >> "$GITHUB_OUTPUT"
            echo "${role}_registry_digest=${digest}" >> "$GITHUB_OUTPUT"
          }
          build_and_publish frontend docker/Dockerfile.frontend.prod
          build_and_publish backend docker/Dockerfile.backend.prod
          build_and_publish worker docker/Dockerfile.worker
      - name: Generate canonical deployment-disabled release manifest
        env:
          RELEASE_ID: ${{ steps.identity.outputs.release_id }}
          FRONTEND_REF: ${{ steps.images.outputs.frontend_ref }}
          BACKEND_REF: ${{ steps.images.outputs.backend_ref }}
          WORKER_REF: ${{ steps.images.outputs.worker_ref }}
        run: |
          set -Eeuo pipefail
          mkdir -p release-evidence
          compose_sha="$(sha256sum docker/docker-compose.pull.yml | cut -d' ' -f1)"
          created_at="$(date -u -d "@$(git show -s --format=%ct "$GITHUB_SHA")" +'%Y-%m-%dT%H:%M:%SZ')"
          python3 ops/release/generate-release-manifest.py \
            --output release-evidence/release.json \
            --release-id "$RELEASE_ID" \
            --repository "$GITHUB_REPOSITORY" \
            --git-sha "$GITHUB_SHA" \
            --run-id "$GITHUB_RUN_ID" \
            --run-attempt "$GITHUB_RUN_ATTEMPT" \
            --created-at "$created_at" \
            --platform linux/amd64 \
            --compose-path docker/docker-compose.pull.yml \
            --compose-sha256 "$compose_sha" \
            --frontend "$FRONTEND_REF" \
            --backend "$BACKEND_REF" \
            --worker "$WORKER_REF" \
            --postgres docker.io/library/postgres@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777 \
            --redis docker.io/library/redis@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
          python3 ops/release/validate-release-manifest.py release-evidence/release.json
          grep -q '"deployment_authorized": false' release-evidence/release.json
          (cd release-evidence && sha256sum release.json > release.json.sha256)
          cp docker/docker-compose.pull.yml release-evidence/docker-compose.pull.yml
          cp docs/operations/financial-os-release-manifest.schema.json release-evidence/
      - name: Publish release manifest as immutable OCI artifact
        id: publish-release
        env:
          RELEASE_ID: ${{ steps.identity.outputs.release_id }}
        run: |
          set -Eeuo pipefail
          repository="ghcr.io/sanhaji182/financial-os-release"
          oras push "${repository}:${RELEASE_ID}" \
            --artifact-type application/vnd.financial-os.release.v1+json \
            release-evidence/release.json:application/vnd.financial-os.release.manifest.v1+json \
            release-evidence/release.json.sha256:text/plain \
            release-evidence/docker-compose.pull.yml:application/vnd.docker.compose.project.v1+yaml
          digest="$(oras resolve "${repository}:${RELEASE_ID}")"
          [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]
          ref="${repository}@${digest}"
          printf '%s\n' "$ref" > release-evidence/release-oci-ref.txt
          echo "release_oci_ref=$ref" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ steps.identity.outputs.artifact_name }}
          path: release-evidence/
          if-no-files-found: error
          retention-days: 30

  verify-candidate:
    if: github.event_name == 'push'
    needs: publish-candidate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: oras-project/setup-oras@22ce207df3b08e061f537244349aac6ae1d214f6
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: ${{ needs.publish-candidate.outputs.artifact-name }}
          path: release-evidence
      - name: Verify workflow evidence and pull-only Compose
        run: |
          set -Eeuo pipefail
          ops/release/verify-release-bundle.sh \
            --manifest release-evidence/release.json \
            --checksum release-evidence/release.json.sha256 \
            --compose docker/docker-compose.pull.yml \
            --render-output /tmp/docker-compose.pull.rendered.json
      - name: Inspect every application image by immutable digest
        env:
          EXPECTED_SHA: ${{ github.sha }}
          EXPECTED_RELEASE: ${{ needs.publish-candidate.outputs.release-id }}
        run: |
          set -Eeuo pipefail
          python3 - release-evidence/release.json > /tmp/application-images <<'PY'
          import json,sys
          for ref in json.load(open(sys.argv[1]))['application_images'].values(): print(ref)
          PY
          while IFS= read -r ref; do
            docker buildx imagetools inspect "$ref" >/dev/null
            labels="$(docker buildx imagetools inspect "$ref" --format '{{json .Image.Config.Labels}}')"
            python3 - "$labels" "$EXPECTED_SHA" "$EXPECTED_RELEASE" <<'PY'
          import json,sys
          labels=json.loads(sys.argv[1])
          assert labels['org.opencontainers.image.source']=='https://github.com/sanhaji182/financial_tracker_planner'
          assert labels['org.opencontainers.image.revision']==sys.argv[2]
          assert labels['org.opencontainers.image.version']==sys.argv[3]
          PY
          done < /tmp/application-images
      - name: Read back OCI release artifact and compare bytes
        env:
          RELEASE_OCI_REF: ${{ needs.publish-candidate.outputs.release-oci-ref }}
        run: |
          set -Eeuo pipefail
          test "$(cat release-evidence/release-oci-ref.txt)" = "$RELEASE_OCI_REF"
          mkdir /tmp/release-oci
          oras pull "$RELEASE_OCI_REF" --output /tmp/release-oci
          cmp release-evidence/release.json /tmp/release-oci/release-evidence/release.json
          cmp release-evidence/release.json.sha256 /tmp/release-oci/release-evidence/release.json.sha256
          cmp release-evidence/docker-compose.pull.yml /tmp/release-oci/release-evidence/docker-compose.pull.yml
          python3 ops/release/validate-release-manifest.py /tmp/release-oci/release-evidence/release.json
      - name: Record immutable verification summary
        env:
          RELEASE_ID: ${{ needs.publish-candidate.outputs.release-id }}
          RELEASE_OCI_REF: ${{ needs.publish-candidate.outputs.release-oci-ref }}
        run: |
          {
            echo '## Financial OS immutable candidate verified'
            echo
            echo "- Source SHA: $GITHUB_SHA"
            echo "- Release: $RELEASE_ID"
            echo "- OCI manifest: $RELEASE_OCI_REF"
            echo '- Verify permissions: contents:read, packages:read'
            echo '- Deployment authorized: false'
            echo '- Migration execution authorized: false'
            echo '- Production deployment: absent'
          } >> "$GITHUB_STEP_SUMMARY"
